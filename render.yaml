# Render Blueprint for the Paperclip control plane.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    runtime: docker
    name: paperclip
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: checksPass
    healthCheckPath: /api/health
    maxShutdownDelaySeconds: 120
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 3100
      - key: SERVE_UI
        value: "true"
      - key: PAPERCLIP_HOME
        value: /paperclip
      - key: PAPERCLIP_CONFIG
        value: /paperclip/instances/default/config.json
      - key: PAPERCLIP_INSTANCE_ID
        value: hlt
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: public
      - key: PAPERCLIP_AUTH_DISABLE_SIGN_UP
        value: "true"
      - key: PAPERCLIP_SECRETS_STRICT_MODE
        value: "true"
      - key: PAPERCLIP_MIGRATION_AUTO_APPLY
        value: "true"
      - key: PAPERCLIP_MIGRATION_PROMPT
        value: never
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: PAPERCLIP_PUBLIC_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: KATAILYST_MCP_URL
        sync: false
      - key: KATAILYST_MCP_TOKEN
        sync: false
      - key: KATAILYST_PAT
        sync: false
    disk:
      name: paperclip-data
      mountPath: /paperclip
      sizeGB: 10

databases:
  - name: paperclip-db
    databaseName: paperclip
    user: paperclip
    plan: basic-256mb
